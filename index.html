<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Melissa ❤️</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: black;
      color: white;
    }

    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://i.gifer.com/YmXB.gif') repeat;
      background-size: cover;
      z-index: -1;
      animation: slowPan 60s linear infinite;
    }

    @keyframes slowPan {
      0% { background-position: 0 0; }
      100% { background-position: 1000px 1000px; }
    }

    .message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      animation: fadeIn 3s ease-in-out;
    }

    .message h1 {
      font-size: 5em;
      margin: 0;
    }

    .message p {
      font-size: 8em;
      color: #ff4d4d;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -60%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background-image: url('https://emojiapi.dev/api/v1/2764/64.png');
      background-size: cover;
      animation: fall linear infinite;
      opacity: 0.7;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
      }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="message">
    <h1>Melissa</h1>
    <p>I love you ❤️❤️❤️</p>
  </div>

  <script>
    // Create falling hearts
    for (let i = 0; i < 30; i++) {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.style.left = `${Math.random() * 100}vw`;
      heart.style.top = `${Math.random() * -100}vh`;
      heart.style.animationDuration = `${5 + Math.random() * 10}s`;
      heart.style.opacity = `${0.3 + Math.random() * 0.7}`;
      document.body.appendChild(heart);
    }
  </script>
</body>
</html>

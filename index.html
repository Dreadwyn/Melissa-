<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Melissa ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      color: white;
      font-family: 'Montserrat', sans-serif;
    }

    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://i.gifer.com/YmXB.gif') repeat;
      background-size: cover;
      z-index: -1;
      animation: slowPan 60s linear infinite;
    }

    @keyframes slowPan {
      0% { background-position: 0 0; }
      100% { background-position: 1000px 1000px; }
    }

    .message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      animation: fadeIn 3s ease-in-out;
    }

    .message h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 11em;
      color: #ffcccc;
      animation: floatText 5s ease-in-out infinite alternate;
    }

    .message p {
      font-size: 9em;
      font-weight: 700;
      color: #ffffff;
      animation: scaleIn 2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -60%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }

    @keyframes floatText {
      0% { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-50%, -52%) scale(1.03); }
    }

    @keyframes scaleIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    .heart {
      position: absolute;
      width: 45px;
      height: 45px;
      background-image: url('https://emojiapi.dev/api/v1/2764/64.png');
      background-size: cover;
      animation: fall linear infinite;
      opacity: 0.7;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
      }
    }
  </style>
</head>
<body>
  <audio controls>
  <source src="Twenty one pilots - The Line (Soundtrack from the Animated Series) (by Arcane & League of Legends Music).mp3" type="audio/mpeg">
  <source src="music.ogg" type="audio/ogg">
  Ваш браузер не поддерживает аудио.
  </audio>
  <div class="stars"></div>
  <div class="message">
    <h1>Melissa</h1>
    <p>I love you ❤️</p>
  </div>

  <script>
    for (let i = 0; i < 30; i++) {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.style.left = `${Math.random() * 100}vw`;
      heart.style.top = `${Math.random() * -100}vh`;
      heart.style.animationDuration = `${5 + Math.random() * 10}s`;
      heart.style.opacity = `${0.3 + Math.random() * 0.7}`;
      document.body.appendChild(heart);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мелисса, я люблю тебя</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      text-align: center;
      background: url('http://spacegid.com/wp-content/uploads/2016/03/Zvezdnoe-nebo.jpg') no-repeat center center fixed;
      background-size: cover;
    }
    .overlay {
      background: rgba(0, 0, 0, 0.6);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 20px;
      animation: fadeIn 3s ease forwards;
    }
    p {
      font-size: 1.5em;
      animation: fadeIn 6s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .heart {
      position: absolute;
      color: #ff4d6d;
      font-size: 2em;
      animation: float 10s infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Melissa</h1>
    <p>I love you ❤️</p>
  </div>
  <div class="hearts" id="hearts"></div>

  <audio autoplay loop>
    <source src="https://youtu.be/E2Rj2gQAyPA?si=iGAZ9spUE-G_OpNB&quot;&gt" type="audio/mpeg">
  </audio>

  <script>
    const hearts = document.getElementById('hearts');
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = 5 + Math.random() * 5 + 's';
      heart.innerHTML = '❤️';
      hearts.appendChild(heart);
      setTimeout(() => heart.remove(), 10000);
    }
    setInterval(createHeart, 500);
  </script>
</body>
</html>
